<html>

<head>
    <title>Form</title>
    <link rel="stylesheet" type="text/css" href="style_5.css">
</head>
<body>

            <form class="personal-form">
                <center>
                    <h2>Введите свои данные</h2>
                    <br>
                    <label>
                        Имя:
                        <br>
                        <input type="text" name="name" required>
                    </label>
                    <br>
                    <label>
                        Фамилия:
                        <br>
                        <input type="text" name="fam" required>
                    </label>
                    <br>
                    <label>
                        Номер телефона:
                        <br>
                        <input type="text" name="phone" placeholder="+7 (___) ___-__-__" required>
                    </label>
                    <br>
                    <label>
                        Возраст:
                        <br>
                        <select name="age" required>
                            <option value="">Выберите возраст</option>
                            <option value="<18">Меньше 18 лет</option>
                            <option value="18-25">18-25 лет</option>
                            <option value="26-35">26-35 лет</option>
                            <option value="36-50">36-50 лет</option>
                            <option value="50+">50+ лет</option>
                        </select>
                    </label>
                    <br>
                    <label>
                        Адрес:
                        <br>
                        <input type="text" name="address" placeholder="Город, улица" required>
                    </label>
                    <br>
                    <label>
                        Ваш любимый цвет:
                        <br>
                        <input type="text" name="secret" placeholder="Введите цвет" required>
                    </label>
                    <br>
                    <br>
                    <input type="submit"></input>
                </center>
            </form>
    
</body>

</html>
